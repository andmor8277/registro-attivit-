name: Update README

on:
  release:
    types: [published]
  push:
    branches: [master]
    paths:
      - CHANGELOG.md
      - README.md

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract latest version
        id: version
        run: |
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/v//' || echo "0.0.0")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update README with latest release info
        run: |
          VERSION=${{ steps.version.outputs.version }}
          
          # Extract changelog for current version
          CHANGES=$(sed -n "/## \[$VERSION\]/,/## \[/p" CHANGELOG.md | head -n -1 | tail -n +2)
          
          # Create release info section
          cat > /tmp/release_info.md << 'EOF'
          ## 🚀 Ultima Release

          <!-- RELEASE_INFO -->
          La versione più recente è la **v$VERSION**.

          ### Novità della release
          $CHANGES

          ### Come aggiornare
          ```bash
          ./release.sh minor "Descrizione novità"
          ```

          ---

          Leggi il [CHANGELOG](CHANGELOG.md) per tutte le versioni.
          EOF

          # Update README if it has RELEASE_INFO marker
          if grep -q "<!-- RELEASE_INFO -->" README.md; then
            sed -i 's/<!-- RELEASE_INFO -->.*/<!-- RELEASE_INFO -->/' README.md
          fi

      - name: Commit README changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: Update README with latest release info"
          file_pattern: README.md
